<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Eid Card Generator | Create & Download</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Great+Vibes&family=Cormorant+Garamond:wght@600&family=Cinzel:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                50: '#fffcf0', 100: '#fff7d6', 200: '#ffeda3', 300: '#ffdd61', 400: '#ffc81f',
                500: '#f5b002', 600: '#d48d02', 700: '#a66602', 800: '#855008', 900: '#71420d', 950: '#422203'
              },
              luxury: '#0a0a0a',
            },
            fontFamily: {
              serif: ['Playfair Display', 'serif'], sans: ['Poppins', 'sans-serif'], script: ['Great Vibes', 'cursive'],
              classic: ['Cormorant Garamond', 'serif'], elegant: ['Cinzel', 'serif'], whimsical: ['Dancing Script', 'cursive'],
            },
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply min-h-screen text-slate-200 font-sans p-4 md:p-8 flex flex-col items-center;
          background: radial-gradient(circle at center, #1a1a1b 0%, #0a0a0a 100%);
        }
      }
      @layer components {
        .glass { background: rgba(255, 255, 255, 0.03); @apply backdrop-blur-md border border-white/5; }
        .gold-text {
          background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
          background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-primary { @apply w-full py-4 rounded-xl bg-gradient-to-r from-gold-600 to-gold-400 text-luxury font-bold uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition shadow-lg shadow-gold-900/20; }
        .btn-secondary { @apply w-full py-4 rounded-xl border border-gold-500 text-gold-500 font-bold uppercase tracking-widest hover:bg-gold-500 hover:text-luxury transition; }
        .input-field { @apply block w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-gold-500 focus:ring-1 focus:ring-gold-500 outline-none transition px-4; }
        .select-field { @apply block w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-gold-500 focus:ring-1 focus:ring-gold-500 outline-none transition appearance-none cursor-pointer; }
        .label-xs { @apply block text-xs font-semibold text-gold-400 uppercase tracking-wider mb-2; }
      }
    </style>
  </head>
  <body>
    
    <div class="max-w-7xl w-full">
      <header class="text-center mb-12">
        <h1 class="text-4xl md:text-6xl gold-text mb-2 drop-shadow-lg font-serif">✨ Eid Card Generator</h1>
        <p class="text-slate-400 font-light tracking-widest uppercase text-sm">Create Premium Greeting Cards Instantly</p>
      </header>

      <main class="grid lg:grid-cols-12 gap-12 items-start">
        <!-- Form Section -->
        <div class="lg:col-span-5 space-y-6 glass p-8 rounded-3xl shadow-2xl">
          <div>
            <label class="label-xs">Upload Photo</label>
            <input
              type="file"
              id="imageUpload"
              class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-gold-500 file:text-luxury hover:file:bg-gold-400 cursor-pointer"
            />
          </div>

          <div>
            <label class="label-xs">Sender Name</label>
            <input
              type="text"
              id="sender"
              class="input-field"
              placeholder="Your Name"
              oninput="updateCardPreview()"
            />
          </div>

          <div>
            <label class="label-xs">Recipient Name</label>
            <input
              type="text"
              id="receiver"
              class="input-field"
              placeholder="Recipient Name"
              oninput="updateCardPreview()"
            />
          </div>

          <div>
            <label class="label-xs">Typography Style</label>
            <select 
              id="fontChoice" 
              onchange="updateCardPreview()"
              class="select-field"
            >
              <option value="serif" class="bg-luxury" style="font-family: 'Playfair Display', serif;">Playfair Display (Serif)</option>
              <option value="script" class="bg-luxury" style="font-family: 'Great Vibes', cursive;">Great Vibes (Script)</option>
              <option value="classic" class="bg-luxury" style="font-family: 'Cormorant Garamond', serif;">Cormorant Garamond (Classic)</option>
              <option value="elegant" class="bg-luxury" style="font-family: 'Cinzel', serif;">Cinzel (Elegant)</option>
              <option value="whimsical" class="bg-luxury" style="font-family: 'Dancing Script', cursive;">Dancing Script (Playful)</option>
              <option value="sans" class="bg-luxury" style="font-family: 'Poppins', sans-serif;">Poppins (Modern)</option>
            </select>
          </div>

          <div>
            <label class="label-xs">Message Preset</label>
            <select 
              id="preset" 
              onchange="applyPreset()"
              class="select-field"
            >
              <option value="" class="bg-luxury">✨ Select Eid Message</option>
              <option value="Wishing you and your family peace, happiness, and prosperity this Eid." class="bg-luxury">Classic Wish</option>
              <option value="May Allah accept your prayers and bless you with joy and success. Eid Mubarak!" class="bg-luxury">Spiritual</option>
              <option value="Eid Mubarak! May your days be filled with laughter, love, and delicious food." class="bg-luxury">Friendly</option>
              <option value="Sending warm wishes on Eid. May this beautiful occasion bring you closer to your loved ones." class="bg-luxury">Warm</option>
            </select>
          </div>

          <div>
            <label class="label-xs">Custom Message</label>
            <textarea
              id="message"
              rows="3"
              class="input-field"
              placeholder="Write your message..."
              oninput="updateCardPreview()"
            ></textarea>
          </div>

          <div class="space-y-4">
            <div class="flex items-center gap-3">
              <input 
                type="checkbox" 
                id="showQR" 
                onchange="updateCardPreview()"
                class="w-5 h-5 rounded border-white/10 bg-white/5 text-gold-500 focus:ring-gold-500 cursor-pointer"
              >
              <label for="showQR" class="label-xs mb-0 cursor-pointer">Include QR Code</label>
            </div>
            
            <div id="qrInputContainer" class="hidden space-y-3">
              <div>
                <label class="label-xs">Phone Number (for QR Code)</label>
                <input
                  type="tel"
                  id="phone"
                  class="input-field"
                  placeholder="+880123456789"
                  oninput="updateCardPreview()"
                />
              </div>
              <div>
                <label class="label-xs">Optional: QR Code Text or URL</label>
                <input
                  type="text"
                  id="qrData"
                  class="input-field"
                  placeholder="https://example.com"
                  oninput="updateCardPreview()"
                />
              </div>
            </div>
          </div>

          <div class="pt-4 space-y-3">
            <button
              onclick="generateCard()"
              class="btn-primary"
            >
              Generate Card
            </button>
            <button
              id="downloadBtn"
              onclick="downloadCard(event)"
              class="btn-secondary"
            >
              Download PNG
            </button>
          </div>
        </div>

        <!-- Preview Section -->
        <div class="lg:col-span-7 flex flex-col items-center">
          <label class="label-xs self-start">Card Preview</label>
          <div
            id="card"
            class="relative w-full max-w-[800px] rounded-2xl overflow-hidden shadow-[0_0_80px_rgba(245,176,2,0.15)] bg-luxury flex items-center justify-center text-slate-600 border border-white/5"
          >
            <div class="text-center p-8">
              <p class="text-gold-500/50 text-xl italic" style="font-family: 'Playfair Display', serif;">Preview will appear here after upload and generation</p>
            </div>
          </div>
          <p class="mt-6 text-slate-500 text-sm italic">Note: High-quality rendering is applied on download.</p>
        </div>
      </main>

      <footer class="mt-20 text-center text-slate-600 text-sm">
        <p>© 2026 Luxury Eid Greeting Card Studio</p>
      </footer>
    </div>

    <!-- Script dependencies -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
